name: Update Google Scholar stats

on:
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scholar-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "scholarly==1.7.11" free-proxy

      - name: Fetch Scholar stats
        id: fetch
        timeout-minutes: 10
        continue-on-error: true
        run: python scripts/fetch_scholar.py

      - name: Report blocked fetch
        if: steps.fetch.outcome != 'success'
        run: |
          echo "Google Scholar was unreachable from this runner (blocked or timed out)." >> "$GITHUB_STEP_SUMMARY"
          echo "Kept the last good assets/data/scholar.json; the daily cron will retry." >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push if changed
        if: steps.fetch.outcome == 'success'
        run: |
          if git diff --quiet -- assets/data/scholar.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/scholar.json
          git commit -m "chore: update Google Scholar stats [skip ci]"
          git push
