<style>
  :root{
    --bg:#f5f6f8; --card:#ffffff; --text:#1c2733; --muted:#66788a;
    --accent:#1E3A5F; --accent-ink:#ffffff; --line:#dde3ea; --err:#b3382c;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#10161d; --card:#182028; --text:#e8edf2; --muted:#8fa1b3;
           --accent:#8FB3DC; --accent-ink:#0f1720; --line:#2a3540; --err:#e2685c; }
  }
  :root[data-theme="dark"]{ --bg:#10161d; --card:#182028; --text:#e8edf2; --muted:#8fa1b3;
           --accent:#8FB3DC; --accent-ink:#0f1720; --line:#2a3540; --err:#e2685c; }
  :root[data-theme="light"]{ --bg:#f5f6f8; --card:#ffffff; --text:#1c2733; --muted:#66788a;
           --accent:#1E3A5F; --accent-ink:#ffffff; --line:#dde3ea; --err:#b3382c; }
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);
       font:16px/1.5 "Avenir Next","Helvetica Neue",system-ui,sans-serif;
       display:flex;align-items:center;justify-content:center}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;
        padding:34px 34px 28px;width:min(92vw,360px);text-align:center;
        box-shadow:0 8px 30px rgba(0,0,0,.10)}
  .glyph{font-size:34px;line-height:1;margin-bottom:12px}
  h1{font-size:19px;margin:0 0 4px;font-weight:600;letter-spacing:.01em}
  p.hint{margin:0 0 20px;color:var(--muted);font-size:13.5px}
  form{display:flex;flex-direction:column;gap:10px}
  input[type=password]{padding:11px 12px;border:1px solid var(--line);border-radius:7px;
        background:var(--bg);color:var(--text);font-size:15px;outline:none;
        font-family:"SF Mono",ui-monospace,Menlo,monospace;letter-spacing:.08em;text-align:center}
  input[type=password]:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%, transparent)}
  button{padding:11px 12px;border:0;border-radius:7px;background:var(--accent);color:var(--accent-ink);
        font-size:15px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.55;cursor:wait}
  button:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .err{color:var(--err);font-size:13px;min-height:18px;margin-top:10px}
  .foot{margin-top:18px;font-size:11.5px;color:var(--muted)}
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(3px)}30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}
  @media (prefers-reduced-motion: no-preference){ .card.no{animation:shake .45s} }
</style>

  </form>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
const $ = id => document.getElementById(id);

async function keyFromPassword(pw){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    {name:'PBKDF2', salt:b64(DATA.salt), iterations:DATA.iter, hash:'SHA-256'}, km, 256);
  return crypto.subtle.importKey('raw', bits, 'AES-GCM', false, ['decrypt']);
}
async function tryUnlock(pw){
  const key = await keyFromPassword(pw);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(DATA.iv)}, key, b64(DATA.ct));
  try { sessionStorage.setItem('pd.pw', pw); } catch(e){}
  const raw = new TextDecoder().decode(pt);
  const html = /^\s*<!doctype/i.test(raw) ? raw : '<!doctype html>\n' + raw;
  document.open(); document.write(html); document.close();
}
$('f').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = $('go'); btn.disabled = true; btn.textContent = 'Checking…'; $('err').textContent = '';
  try { await tryUnlock($('pw').value); }
  catch(err){
    btn.disabled = false; btn.textContent = 'Unlock';
    $('err').textContent = 'Wrong password.';
    const c = $('card'); c.classList.remove('no'); void c.offsetWidth; c.classList.add('no');
    $('pw').select();
  }
});
(async () => {
  let saved = null;
  try { saved = sessionStorage.getItem('pd.pw'); } catch(e){}
  if (saved){ try { await tryUnlock(saved); } catch(e){ try{sessionStorage.removeItem('pd.pw');}catch(_){}} }
})();
</script>
