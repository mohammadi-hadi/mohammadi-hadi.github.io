    Profile:
      - Researcher in explainable NLP (PhD, Utrecht University) and Senior AI &
        Data Science Expert at AcademicTransfer. I build production LLM systems
        for ranking, matching, and evaluation, and I study how to make them
        transparent, reliable, and culturally fair.
      - 'Track record: six doctoral research projects, five competitively funded
        projects (over €40K) led end to end, and production AI used by 22 Dutch
        research universities. I release code and data with my work.'

