  sections:
    Profile:
      - Researcher in Explainable Natural Language Processing for social-science
        applications, having completed my PhD in the Department of Methodology &
        Statistics at Utrecht University. Across six doctoral research projects, I
        develop transparent and reliable methods for large language models, covering
        LLM-as-judge evaluation, annotation quality, cultural alignment, and
        token-level robustness, and connect them to applied data science questions.
      - I work as an independent researcher who leads projects end to end — alongside
        the PhD I have led five competitively funded projects, taking each from
        proposal through to delivery. I now serve as Senior AI & Data Science Expert
        at AcademicTransfer, where I lead applied LLM work in production and am
        technical lead of three applied AI projects. I am committed to open,
        reproducible research, releasing code and data with my work.

